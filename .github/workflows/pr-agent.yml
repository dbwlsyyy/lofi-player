name: Gemini PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_agent:
    # 봇이 쓴 글에는 반응하지 않음 (무한 루프 방지)
    if: ${{ github.actor != 'github-actions[bot]' && (github.event.pull_request != null || github.event.issue.pull_request != null) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run Gemini PR Reviewer
        uses: qodo-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 모델 설정 (계층 구분자는 __ 언더스코어 2개)
          CONFIG__MODEL: "gemini/gemini-3.1-flash-lite-preview"
          CONFIG__FALLBACK_MODELS: '["gemini/gemini-2.5-flash", "gemini/gemini-2.5-flash-lite", "gemini/gemini-3-flash"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32000"

          # 언어 .g
          PR_DESCRIPTION__LANGUAGE: "ko-KR"
          PR_REVIEWER__LANGUAGE: "ko-KR"

          # PR 요약 지시사항
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: |
            1. 무조건 '한국어 구어체(~했습니다, ~합니다)'로 작성하세요. AI 서명이나 영어는 절대 금지.
            2. 주요 변경 사항을 핵심 위주로 요약하고, '### ⚡ Tech Stack & Patterns' 섹션에 다음 항목을 체크(✅/❌)하세요:
               - 로직과 UI의 분리 (Separation of Concerns)
               - 적절한 상태 관리 도구 활용 (Props-drilling 방지 등)
               - 에러 핸들링 및 예외 처리 반영 여부
            3. 응답 마지막에 Mermaid.js 문법으로 이번 PR의 '핵심 로직 흐름' 또는 '컴포넌트 구조'를 시각화한 다이어그램을 1개 포함하세요.

          # 코드 리뷰 지시사항
          PR_REVIEWER__EXTRA_INSTRUCTIONS: |
            1. 무조건 '한국어'로 작성하세요. 주니어 개발자의 성장을 돕는 친절한 사수 역할을 해주세요.
            2. 컴포넌트가 단순히 길다는 이유로 분리하라는 지적은 하지 마세요. (논리적 분리가 필요할 때만 제안)
            3. 리뷰 항목마다 [위험도: 높음/중간/낮음]을 반드시 표시하세요.
            4. '🎨 코드 퀄리티 가이드'라는 제목으로 다음 사항을 묶어서 설명하세요:
               - 변수/함수명이 직관적이고 의도가 명확한지
               - 반복되는 로직이 있다면 추상화(Hook 등)가 가능한지
               - 불필요한 성능 저하 요소(불필요한 리렌더링 등)가 있는지
            5. 단순 오타 지적보다는 "이 코드가 왜 위험한지" 혹은 "어떻게 하면 더 읽기 편할지"에 대한 근거를 포함해주세요.

          # 자동화 옵션
          PR_DESCRIPTION__PUBLISH_DESCRIPTION_AS_COMMENT: "false"
          PR_REVIEWER__ENABLE_REVIEW_LABELS_SECURITY: "false"
          GITHUB_ACTION__AUTO_REVIEW: "true"
          GITHUB_ACTION__AUTO_IMPROVE: "true"
